<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>도톨아 골라줘 🌰</title>
<style>
:root{
  --bg:#F2F2F7;--card:#FFF;--sep:rgba(60,60,67,.09);
  --b1:rgba(60,60,67,.13);--b2:rgba(60,60,67,.20);
  --t1:#1C1C1E;--t2:#3A3A3C;--t3:#636366;--t4:#8E8E93;--t5:#AEAEB2;
  --blue:#007AFF;--blue-lt:rgba(0,122,255,.10);
  --green:#34C759;--green-lt:rgba(52,199,89,.11);
  --red:#FF3B30;--red-lt:rgba(255,59,48,.09);
  --orange:#FF9500;--orange-lt:rgba(255,149,0,.10);
  --acc:#FF6B35;--acc-lt:rgba(255,107,53,.11);
  --r20:20px;--r16:16px;--r12:12px;--r8:8px;
  --s1:0 1px 3px rgba(0,0,0,.06);
  --s2:0 2px 10px rgba(0,0,0,.08),0 1px 3px rgba(0,0,0,.05);
  --s3:0 4px 24px rgba(0,0,0,.10),0 2px 6px rgba(0,0,0,.05);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%}
body{
  font-family:-apple-system,"SF Pro Text","Apple SD Gothic Neo","Pretendard",sans-serif;
  background:var(--bg);color:var(--t1);
  -webkit-font-smoothing:antialiased;font-size:15px;line-height:1.45;
}
.wrap{max-width:420px;margin:0 auto;padding:0 0 120px}
.hd{
  position:sticky;top:0;z-index:99;
  background:rgba(242,242,247,.92);
  backdrop-filter:saturate(180%) blur(22px);
  -webkit-backdrop-filter:saturate(180%) blur(22px);
  border-bottom:.5px solid var(--b1);
  padding:52px 20px 14px;
}
.hd-inner{display:flex;align-items:center;gap:10px}
.hd-ico{
  width:44px;height:44px;border-radius:13px;flex-shrink:0;
  background:linear-gradient(145deg,#FFF3E8,#FFCFAE);
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--s2);overflow:hidden;padding:4px;
}
.hd-ico img{width:100%;height:100%;object-fit:contain}
.hd-title{font-size:21px;font-weight:800;letter-spacing:-.6px}
.hd-title span{color:var(--acc)}
.hd-sub{font-size:11px;color:var(--t4);font-weight:500;margin-top:1px}
.sec{padding:20px 16px 0}
.sec-label{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px}
.notice{background:var(--blue-lt);border:1px solid rgba(0,122,255,.15);border-radius:var(--r12);padding:10px 13px;font-size:12px;color:var(--t2);line-height:1.55;margin-bottom:12px}
.notice strong{color:var(--blue)}
.link-list{display:flex;flex-direction:column;gap:10px;margin-bottom:10px}
.link-card{background:var(--card);border-radius:var(--r16);box-shadow:var(--s2);border:.5px solid var(--b1);overflow:hidden}
.lc-top{display:flex;align-items:center;gap:8px;padding:12px 14px 10px}
.lc-num{width:24px;height:24px;border-radius:7px;flex-shrink:0;background:var(--acc-lt);color:var(--acc);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center}
.lc-url{flex:1;font-size:14px;color:var(--t1);border:none;background:none;outline:none;font-family:inherit;min-width:0}
.lc-url::placeholder{color:var(--t5)}
.lc-del{width:26px;height:26px;border-radius:50%;flex-shrink:0;background:var(--red-lt);border:none;color:var(--red);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lc-del:active{opacity:.6;transform:scale(.9)}
.lc-status{padding:0 14px 10px;font-size:12px;font-weight:600;display:none;align-items:center;gap:5px}
.lc-status.show{display:flex}
.lc-status.fetching{color:var(--blue)}
.lc-status.ok{color:var(--green)}
.lc-status.err{color:var(--orange)}
.lc-title{padding:0 14px 12px;font-size:13px;font-weight:700;color:var(--t2);display:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lc-title.show{display:block}
.add-link-btn{width:100%;padding:13px;border-radius:var(--r16);border:1.5px dashed var(--blue);background:none;color:var(--blue);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
.link-clear-btn{font-size:12px;font-weight:600;color:var(--red);background:var(--red-lt);border:none;border-radius:14px;padding:5px 11px;cursor:pointer;font-family:inherit;text-transform:none;letter-spacing:0}
.link-clear-btn:active{opacity:.7}
.add-link-btn:active{background:var(--blue-lt)}
.tags-wrap{display:flex;flex-wrap:wrap;gap:8px;padding:4px 0}
.tag{padding:8px 15px;border-radius:22px;font-size:13px;font-weight:700;cursor:pointer;border:1.5px solid var(--b2);background:var(--card);color:var(--t3);transition:all .18s;font-family:inherit;box-shadow:var(--s1)}
.tag.on{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 3px 10px rgba(0,122,255,.28)}
.tag:active{transform:scale(.95)}
.divider{height:.5px;background:var(--b1);margin:0 16px}
.cta-wrap{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;z-index:98;padding:10px 16px 32px;background:rgba(242,242,247,.93);backdrop-filter:saturate(180%) blur(22px);-webkit-backdrop-filter:saturate(180%) blur(22px);border-top:.5px solid var(--b1)}
.cta{width:100%;padding:16px;border:none;border-radius:var(--r16);background:linear-gradient(155deg,#FF7A45,#FF5010);color:#fff;font-size:16px;font-weight:800;letter-spacing:-.3px;cursor:pointer;font-family:inherit;box-shadow:0 4px 20px rgba(255,107,53,.42);display:flex;align-items:center;justify-content:center;gap:7px;transition:all .18s}
.cta:active{transform:scale(.98);opacity:.9}
.cta:disabled{background:linear-gradient(155deg,#C7C7CC,#AEAEB2);box-shadow:none;cursor:not-allowed}
.cta-hint{text-align:center;font-size:12px;color:var(--t4);font-weight:500;margin-top:7px}
.result-section{padding:0 16px;margin-top:4px}
.verdict{background:linear-gradient(135deg,#FFF6F1,#FFF0FF);border:1.5px solid rgba(255,107,53,.22);border-radius:var(--r20);padding:18px 16px;margin-bottom:14px;box-shadow:0 2px 12px rgba(255,107,53,.10)}
.verdict-eye{font-size:11px;font-weight:700;color:var(--acc);letter-spacing:.8px;text-transform:uppercase;margin-bottom:7px}
.verdict-txt{font-size:18px;font-weight:800;color:var(--t1);line-height:1.4;letter-spacing:-.4px}
.rank-list{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.rank-card{background:var(--card);border-radius:var(--r20);box-shadow:var(--s2);border:.5px solid var(--b1);overflow:hidden}
.rank-card.rank-1{border:2px solid var(--green);background:linear-gradient(145deg,#F0FFF4,#EDFFF8);box-shadow:0 4px 22px rgba(52,199,89,.16)}
.rank-card.rank-2{border-color:rgba(0,122,255,.3)}
.rank-card.rank-3,.rank-card.rank-4,.rank-card.rank-5{opacity:.82}
.rc-head{display:flex;align-items:center;gap:10px;padding:14px 14px 12px;border-bottom:.5px solid var(--sep)}
.rc-rank{width:32px;height:32px;border-radius:10px;flex-shrink:0;font-size:15px;font-weight:900;display:flex;align-items:center;justify-content:center}
.rank-1 .rc-rank{background:rgba(52,199,89,.15);color:var(--green)}
.rank-2 .rc-rank{background:rgba(0,122,255,.10);color:var(--blue)}
.rank-3 .rc-rank,.rank-4 .rc-rank,.rank-5 .rc-rank{background:var(--bg);color:var(--t4)}
.rc-info{flex:1;min-width:0}
.rc-name{font-size:15px;font-weight:800;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.rc-price{font-size:13px;font-weight:600;color:var(--t4)}
.rc-total{text-align:right;flex-shrink:0}
.rc-score{font-size:24px;font-weight:900;letter-spacing:-1px;line-height:1}
.rc-score-sub{font-size:11px;color:var(--t4);font-weight:600;margin-top:1px}
.rc-bars{padding:10px 14px 12px;display:flex;flex-direction:column;gap:7px}
.bar-row{display:flex;align-items:center;gap:8px}
.bar-label{font-size:11px;font-weight:700;color:var(--t3);width:38px;flex-shrink:0}
.bar-track{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.bar-val{font-size:11px;font-weight:800;width:22px;text-align:right;flex-shrink:0}
.rc-reason{padding:10px 14px 14px;border-top:.5px solid var(--sep)}
.rc-reason-title{font-size:10px;font-weight:700;color:var(--t4);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}
.rc-strengths{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.strength-tag{font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--acc-lt);color:var(--acc)}
.checklist{background:var(--card);border-radius:var(--r20);box-shadow:var(--s2);border:.5px solid var(--b1);overflow:hidden;margin-bottom:12px}
.cl-head{padding:12px 14px 8px;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px}
.cl-item{display:flex;gap:9px;padding:9px 14px;border-bottom:.5px solid var(--sep);font-size:13px;line-height:1.5;color:var(--t2)}
.cl-item:last-child{border-bottom:none}
.cl-ico{font-size:14px;flex-shrink:0;margin-top:1px}
.action-btn{width:100%;padding:14px;border-radius:var(--r16);border:1.5px solid var(--b2);background:var(--card);color:var(--blue);font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:var(--s1);margin-bottom:10px}
.action-btn:active{opacity:.75}
.action-btn.ghost{color:var(--t4);border-color:var(--b1)}
.toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%) translateY(6px);background:rgba(28,28,30,.9);backdrop-filter:blur(12px);color:#fff;padding:10px 20px;border-radius:30px;font-size:13px;font-weight:600;z-index:999;opacity:0;pointer-events:none;white-space:nowrap;transition:opacity .22s,transform .22s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.err-box{background:var(--red-lt);border:1px solid rgba(255,59,48,.2);border-radius:var(--r12);padding:14px;margin-bottom:12px}
.err-title{font-size:14px;font-weight:700;color:var(--red);margin-bottom:4px}
.err-body{font-size:13px;color:var(--red);opacity:.85;line-height:1.55}
.loading-box{background:var(--card);border-radius:var(--r20);box-shadow:var(--s2);padding:20px 16px;margin-bottom:12px}
.loading-title{font-size:14px;font-weight:700;color:var(--t1);margin-bottom:12px;display:flex;align-items:center;gap:7px}
.step-list{list-style:none;display:flex;flex-direction:column;gap:8px}
.step-item{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:500;color:var(--t4);transition:color .3s}
.step-item.active{color:var(--blue);font-weight:700}
.step-item.done{color:var(--green)}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--t5);flex-shrink:0;transition:all .3s}
.step-item.active .step-dot{background:var(--blue);box-shadow:0 0 0 3px rgba(0,122,255,.2)}
.step-item.done .step-dot{background:var(--green)}
.spin{display:inline-block;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
@media(max-width:375px){.tags-wrap{gap:6px}.tag{padding:7px 12px;font-size:12px}}
</style>
</head>

  </button>

<script>
const SK='dotori_v3';
let links=[],tags=[],resultData=null;

window.addEventListener('DOMContentLoaded',()=>{
  // 매번 새 세션으로 시작 — 이전 링크/결과를 저장하거나 복원하지 않음
  links=[];tags=[];resultData=null;
  renderLinks();updateCTA();
  addLink();addLink(); // 기본 입력창 2개
});

function save(){ /* 세션 저장 없음 — 새로고침/재방문 시 항상 깨끗하게 시작 */ }
function load(){ /* 사용하지 않음 */ }
const $=id=>document.getElementById(id);
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function toast(msg,dur=2200){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}
function scoreColor(v){if(!v&&v!==0)return'#8E8E93';if(v>=4.2)return'#34C759';if(v>=3.2)return'#007AFF';if(v>=2.2)return'#FF9500';return'#FF3B30';}
function barColor(v){if(v>=4.2)return'var(--green)';if(v>=3.2)return'var(--blue)';if(v>=2.2)return'var(--orange)';return'var(--red)';}

function addLink(){
  if(links.length>=5){toast('최대 5개까지 추가할 수 있어요');return;}
  const id=Date.now()+Math.random();
  links.push({id,url:'',title:'',content:'',status:'idle'});
  renderLinks();updateCTA();
  setTimeout(()=>{const i=document.querySelectorAll('.lc-url');i[i.length-1]?.focus();},60);
}
function removeLink(id){
  links=links.filter(l=>l.id!==id);renderLinks();updateCTA();save();
}
function clearAllLinks(){
  if(links.every(l=>!l.url.trim())){ toast('이미 비어있어요'); return; }
  if(!confirm('입력한 링크를 전부 삭제할까요?')) return;
  links=[];
  renderLinks();
  addLink();addLink();
  updateCTA();
  toast('링크가 모두 삭제됐어요');
}
function renderLinks(){
  const list=$('linkList');if(!list)return;
  list.innerHTML=links.map((l,i)=>`
    <div class="link-card" id="lc-${l.id}">
      <div class="lc-top">
        <div class="lc-num">${i+1}</div>
        <input class="lc-url" type="url" placeholder="https://... (무신사, 쿠팡, 네이버, 엔카 등)"
          value="${esc(l.url)}" onchange="setUrl(${l.id},this.value)" onpaste="onPaste(event,${l.id})"/>
        <button class="lc-del" onclick="removeLink(${l.id})">✕</button>
      </div>
      <div class="lc-status ${l.status!=='idle'?'show':''} ${l.status}" id="ls-${l.id}">
        ${l.status==='fetching'?'<span class="spin">⏳</span> 페이지 읽는 중...':
          l.status==='ok'?'✅ 페이지 읽기 완료':
          l.status==='err'?'⚠️ 읽기 실패 — URL 기반으로 분석':''}
      </div>
      <div class="lc-title ${l.title?'show':''}" id="lt-${l.id}">${esc(l.title)}</div>
    </div>`).join('');
  $('addBtn').style.display=links.length>=5?'none':'';
}
function setUrl(id,val){
  const l=links.find(l=>l.id===id);if(!l)return;
  l.url=val.trim();updateCTA();save();
}
function onPaste(e,id){
  setTimeout(()=>{
    const val=e.target.value.trim();
    const l=links.find(l=>l.id===id);
    if(!l||!val.startsWith('http'))return;
    l.url=val;fetchPage(id);updateCTA();save();
  },50);
}
async function fetchPage(id){
  const l=links.find(l=>l.id===id);
  if(!l||!l.url.startsWith('http'))return;
  l.status='fetching';l.title='';l.content='';updateCard(l);
  try{
    const res=await fetch('/api/fetch-page',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({url:l.url}),
      signal:AbortSignal.timeout(13000)
    });
    const data=await res.json();
    if(!data.ok) throw new Error(data.reason||'fetch_failed');
    l.title=data.title||(l.url.split('/').filter(Boolean).pop()||'제품').slice(0,60);
    l.content=data.content||'';
    l.status='ok';
  }catch(e){
    l.status='err';l.content='';
    l.title=decodeURIComponent(l.url.split('/').filter(Boolean).slice(-2).join(' ')).slice(0,60);
  }
  updateCard(l);updateCTA();
  return l;
}
function updateCard(l){
  const se=$(`ls-${l.id}`),te=$(`lt-${l.id}`);
  if(se){
    se.className=`lc-status show ${l.status}`;
    se.innerHTML=l.status==='fetching'?'<span class="spin">⏳</span> 페이지 읽는 중...':
      l.status==='ok'?'✅ 페이지 읽기 완료':'⚠️ 읽기 실패 — URL 기반으로 분석';
  }
  if(te){te.textContent=l.title;te.className=`lc-title ${l.title?'show':''}`;}
}
function toggleTag(btn,val){
  btn.classList.toggle('on');
  if(btn.classList.contains('on')){if(!tags.includes(val))tags.push(val);}
  else tags=tags.filter(t=>t!==val);
  save();
}
function updateCTA(){
  const vl=links.filter(l=>l.url.trim().startsWith('http'));
  const ok=vl.length>=2;
  $('ctaBtn').disabled=!ok;
  $('ctaTxt').textContent=ok?'🌰 지금 바로 비교해줘!':`링크를 ${vl.length}/2개 입력했어요`;
  $('ctaHint').textContent=ok
    ?`${vl.length}개 제품 · ${tags.length?tags.join(', ')+' 기준':'종합 기준'} 비교`
    :'링크 2개 이상 입력하면 분석 시작!';
}

async function analyze(){
  // input 값을 DOM에서 직접 다시 읽어서 동기화 (onchange 누락 방지)
  document.querySelectorAll('.lc-url').forEach(input=>{
    const card=input.closest('.link-card');
    if(!card)return;
    const id=parseFloat(card.id.replace('lc-',''));
    const l=links.find(l=>l.id===id);
    if(l&&input.value.trim())l.url=input.value.trim();
  });
  save();

  const vl=links.filter(l=>l.url && l.url.startsWith('http'));
  if(vl.length<2){toast('링크를 2개 이상 입력해주세요');return;}

  showResultSection();
  showLoading();

  // 안 읽은 링크들 fetch — 병렬, 실패해도 무조건 진행 (allSettled)
  const needFetch=vl.filter(l=>l.status!=='ok'&&l.status!=='err');
  if(needFetch.length>0){
    await Promise.allSettled(needFetch.map(l=>fetchPage(l.id)));
  }
  save();

  callAI(vl);
}

async function callAI(vl){

  const sys=`당신은 대한민국 최고의 소비재 구매 전문가입니다.
사용자가 제공하는 제품 페이지 내용을 분석하여 각 제품을 비교하고 1개를 추천합니다.

평가 항목 (각 1.0~5.0점):
가격적정성, 성능, 내구성, 후기만족도, 가성비, 디자인, 브랜드신뢰(A/S)

중요 규칙:
- 최종 추천은 반드시 1개만 선택. "둘 다 좋다" 절대 금지
- 사용자가 선택한 중요 기준에 더 높은 가중치 부여
- 실사용 후기 데이터 최우선 반영
- 반드시 한국어로 작성
- 응답 길이 제한: 전체 결과는 매우 짧게 작성. pros/cons는 각 2개 이하, 각 25자 이내. rank_reason/winner_reason/loser_reason은 각각 1문장만 작성
- products 배열의 각 id는 0부터 시작하는 정수, winner_id는 그중 하나와 일치해야 함
- 탈락 제품만 loser_reason에 1문장 이유 작성. 추천 제품의 loser_reason은 null
- checklist는 최대 3개만 작성`;

  const productBlock=vl.map((l,i)=>`[제품 ${i+1}]
URL: ${l.url}
제목: ${l.title||'(없음)'}
페이지 내용:\n${l.content?l.content.slice(0,1600):'(읽기 실패 — URL로만 분석)'}`).join('\n---\n');

  const userMsg=`다음 제품들을 비교해서 순위를 매기고 1개를 추천해주세요.\n\n${productBlock}\n\n사용자 중요 기준: ${tags.length?tags.join(', '):'종합 균형'}`;

  try{
    const res=await fetch('/api/analyze',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({systemPrompt:sys, userMessage:userMsg}),
      signal:AbortSignal.timeout(50000)
    });

    const parsed=await res.json();

    if(!res.ok || parsed.error){
      throw new Error(parsed.error || `서버 오류 (${res.status})`);
    }
    if(!parsed.products || !parsed.products.length){
      throw new Error('분석 결과가 비어있어요. 다시 시도해주세요.');
    }

    resultData=parsed;save();renderResult(parsed);
  }catch(e){
    if(stepTimer)clearInterval(stepTimer);
    let msg;
    const msgLower = (e.message||'').toLowerCase();
    if(e.name==='TimeoutError' || e.name==='AbortError'){
      msg = '분석이 너무 오래 걸려요. 링크 수를 줄이거나 다시 시도해주세요.';
    } else if(e.name==='TypeError' || msgLower.includes('failed to fetch') || msgLower.includes('load failed') || msgLower.includes('networkerror') || msgLower.includes('fetch failed')){
      msg = '서버에 연결하지 못했어요. 잠시 후 다시 시도해주세요.';
    } else {
      msg = e.message || '알 수 없는 오류가 발생했어요.';
    }
    $('resultBody').innerHTML=`<div class="err-box"><div class="err-title">⚠️ 분석에 실패했어요</div><div class="err-body">${esc(msg)}</div></div><button class="action-btn" onclick="analyze()">🔄 다시 분석하기</button>`;
  }
}

function showResultSection(){
  const s=$('resultSection');s.style.display='block';
  setTimeout(()=>s.scrollIntoView({behavior:'smooth',block:'start'}),100);
}
let stepTimer=null;
function showLoading(){
  $('resultBody').innerHTML=`<div class="loading-box">
    <div class="loading-title"><span class="spin">🌰</span> AI가 분석 중...</div>
    <ul class="step-list">
      <li class="step-item active" id="st1"><div class="step-dot"></div>링크 페이지 내용 정리 중</li>
      <li class="step-item" id="st2"><div class="step-dot"></div>제품 정보 & 스펙 추출 중</li>
      <li class="step-item" id="st3"><div class="step-dot"></div>중요 기준 대비 비교 중</li>
      <li class="step-item" id="st4"><div class="step-dot"></div>순위 & 최종 추천 선정 중</li>
    </ul></div>`;
  let i=0;const ids=['st1','st2','st3','st4'];
  if(stepTimer)clearInterval(stepTimer);
  stepTimer=setInterval(()=>{
    if(i>0&&$(ids[i-1]))$(ids[i-1]).className='step-item done';
    if(i<ids.length){$(ids[i]).className='step-item active';i++;}
    else clearInterval(stepTimer);
  },1600);
}

function renderResult(d){
  if(!d||!d.products||!d.products.length){$('resultBody').innerHTML='<div class="err-box"><div class="err-title">결과 없음</div><div class="err-body">다시 분석해주세요.</div></div><button class="action-btn" onclick="analyze()">🔄 다시 분석하기</button>';return;}
  if(stepTimer)clearInterval(stepTimer);
  // winner_id가 없거나 범위 밖이면 최고점 제품으로 자동 보정
  if(d.winner_id==null || !d.products.some(p=>p.id===d.winner_id)){
    const best=[...d.products].sort((a,b)=>(b.total||0)-(a.total||0))[0];
    d.winner_id = best ? best.id : d.products[0].id;
  }
  const partial = d.products.length < 2;
  const SKEYS=['가격','성능','내구성','후기','가성비','디자인','A/S'];
  const sorted=[...d.products].sort((a,b)=>(b.total||0)-(a.total||0));
  let html='';
  if(partial){
    html+=`<div class="err-box" style="margin-bottom:14px"><div class="err-title">⚠️ 일부 결과만 표시돼요</div><div class="err-body">응답이 길어서 일부만 분석됐어요. 링크 수를 줄여 다시 시도하면 더 안정적이에요.</div></div>`;
  }
  html+=`<div class="verdict"><div class="verdict-eye">🌰 도토리의 한줄 결론</div><div class="verdict-txt">${esc(d.verdict||'')}</div></div>`;
  html+='<div class="rank-list">';
  sorted.forEach((p,si)=>{
    const rank=si+1,isWin=p.id===d.winner_id,total=p.total||0;
    const re=rank===1?'🥇':rank===2?'🥈':rank===3?'🥉':`${rank}위`;
    const bars=SKEYS.map(k=>{
      const v=p.scores?.[k];if(v==null)return'';
      const pct=Math.round(v/5*100);
      return`<div class="bar-row"><div class="bar-label">${k}</div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${barColor(v)}"></div></div><div class="bar-val" style="color:${scoreColor(v)}">${v.toFixed(1)}</div></div>`;
    }).join('');
    html+=`<div class="rank-card rank-${rank}">
      <div class="rc-head">
        <div class="rc-rank">${re}</div>
        <div class="rc-info">
          <div class="rc-name">${esc(p.name)}</div>
          <div class="rc-price">${esc(p.price||'가격 미확인')}</div>
        </div>
        <div class="rc-total">
          <div class="rc-score" style="color:${scoreColor(total)}">${total.toFixed(1)}</div>
          <div class="rc-score-sub">/5.0</div>
        </div>
      </div>
      <div class="rc-bars">${bars}</div>
      <div class="rc-reason">
        <div class="rc-reason-title">${isWin?'🏆 추천 이유':`${re} 순위 이유`}</div>
        <div style="font-size:13px;line-height:1.6;color:var(--t2);margin-bottom:8px">${esc(isWin?d.winner_reason:(p.rank_reason||''))}</div>
        ${p.strengths_vs_others?.length?`<div class="rc-reason-title" style="margin-bottom:5px">⚡ 다른 제품 대비 강점</div><div class="rc-strengths">${p.strengths_vs_others.map(s=>`<span class="strength-tag">${esc(s)}</span>`).join('')}</div>`:''}
        ${!isWin&&p.loser_reason?`<div style="margin-top:9px"><div class="rc-reason-title" style="margin-bottom:4px">❌ 탈락 이유</div><div style="font-size:12px;color:var(--red);line-height:1.55">${esc(p.loser_reason)}</div></div>`:''}
        <div style="margin-top:10px;display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div>
            <div class="rc-reason-title" style="margin-bottom:4px;color:var(--green)">👍 장점</div>
            ${(p.pros||[]).map(t=>`<div style="font-size:12px;color:var(--t2);padding:2px 0;display:flex;gap:4px"><span style="color:var(--green)">✓</span><span>${esc(t)}</span></div>`).join('')}
          </div>
          <div>
            <div class="rc-reason-title" style="margin-bottom:4px;color:var(--red)">👎 단점</div>
            ${(p.cons||[]).map(t=>`<div style="font-size:12px;color:var(--t3);padding:2px 0;display:flex;gap:4px"><span style="color:var(--red)">✗</span><span>${esc(t)}</span></div>`).join('')}
          </div>
        </div>
      </div>
    </div>`;
  });
  html+='</div>';
  if(d.checklist?.length){
    html+=`<div class="checklist"><div class="cl-head">✅ 구매 전 체크리스트</div>${d.checklist.map(c=>`<div class="cl-item"><span class="cl-ico">☑️</span><span>${esc(c)}</span></div>`).join('')}</div>`;
  }
  html+=`<button class="action-btn" onclick="copyResult()">📋 결과 복사하기</button>`;
  html+=`<button class="action-btn ghost" onclick="resetResult()">🔄 처음부터 다시</button>`;
  $('resultBody').innerHTML=html;
  requestAnimationFrame(()=>{
    document.querySelectorAll('.bar-fill').forEach(el=>{
      const w=el.style.width;el.style.width='0';
      requestAnimationFrame(()=>{el.style.width=w;});
    });
  });
}

function copyResult(){
  if(!resultData)return;
  const d=resultData,winner=d.products[d.winner_id];
  const sorted=[...d.products].sort((a,b)=>(b.total||0)-(a.total||0));
  let t=`🌰 도톨아 골라줘 분석 결과\n\n📌 ${d.verdict}\n\n🏆 최종 추천: ${winner?.name} (${winner?.price||''})\n\n💬 추천 이유:\n${d.winner_reason}\n\n📊 순위:\n`;
  sorted.forEach((p,i)=>{t+=`${i+1}위. ${p.name} — ${(p.total||0).toFixed(1)}/5.0\n`;});
  t+=`\n✅ 구매 전 체크:\n`;
  (d.checklist||[]).forEach((c,i)=>{t+=`${i+1}. ${c}\n`;});
  navigator.clipboard.writeText(t).then(()=>toast('결과 복사됐어요! 📋')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast('복사됐어요! 📋');
  });
}
function resetResult(){
  resultData=null;
  links=links.map(l=>({...l,status:'idle',content:'',title:''}));
  save();$('resultSection').style.display='none';$('resultBody').innerHTML='';
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
